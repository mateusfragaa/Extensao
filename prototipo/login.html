<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP System - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
            /* Tom de cinza leve das suas telas */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            background: #fff;
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }

        .brand-logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2563eb;
            /* Azul padrão do seu sistema */
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #64748b;
        }

        .form-control {
            border-radius: 8px;
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
        }

        .form-control:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .btn-login {
            background-color: #2563eb;
            border: none;
            padding: 0.75rem;
            border-radius: 8px;
            font-weight: 600;
            width: 100%;
            transition: 0.3s;
            color: white;
            margin-top: 1rem;
        }

        .btn-login:hover {
            background-color: #1d4ed8;
            color: white;
        }

        .forgot-password {
            font-size: 0.8rem;
            color: #2563eb;
            text-decoration: none;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #94a3b8;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="brand-logo d-flex align-items-center justify-content-center">
            <i class="bi bi-grid-1x2-fill me-2"></i> ERP System
        </div>

        <div class="text-center mb-4">
            <h5 class="fw-bold">Bem-vindo de volta</h5>
            <p class="text-muted small">Insira suas credenciais para acessar</p>
        </div>

        <form>
            <div class="mb-3">
                <label for="email" class="form-label">E-mail ou Usuário</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-person"></i></span>
                    <input type="email" class="form-control border-start-0" id="email" placeholder="nome@exemplo.com"
                        required>
                </div>
            </div>

            <div class="mb-3">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <label for="password" class="form-label m-0">Senha</label>
                    <a href="#" class="forgot-password">Esqueceu a senha?</a>
                </div>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control border-start-0" id="password" placeholder="••••••••"
                        required>
                </div>
            </div>

            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="remember">
                <label class="form-check-label small text-muted" for="remember">Lembrar de mim</label>
            </div>

            <!-- <button type="submit" class="btn btn-login">Entrar no Sistema</button> -->
             <a href="main.html" class="btn btn-login">Entrar no Sistema</a>
             <a href="https://mateusfragaa.github.io/Extensao/prototipo/" class="btn btn-login">Voltar à página inicial</a>
        </form>

        <div class="login-footer">
            &copy; 2026 ERP System. Todos os direitos reservados.
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
